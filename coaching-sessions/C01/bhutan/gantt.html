<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bhutan Luxury Travel — Project Gantt Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --saffron:  #FF8C00;
      --crimson:  #C41E3A;
      --forest:   #2D5016;
      --cloud:    #F7F5F0;
      --stone:    #3B3A36;
      --gold:     #D4A843;
      --gold-lt:  #EDD68A;
      --mist:     #EAE7E0;
      --white:    #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cloud);
      color: var(--stone);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 48px 32px;
    }

    /* ─── Header ─────────────────────────────────────────── */
    header {
      max-width: 1100px;
      margin: 0 auto 48px;
      text-align: center;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 400;
      font-size: clamp(26px, 4vw, 38px);
      color: var(--stone);
      letter-spacing: 0.01em;
      margin-bottom: 12px;
    }

    .gold-rule {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 16px auto;
    }

    header p {
      color: #6b6860;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    /* ─── Legend ─────────────────────────────────────────── */
    .legend {
      max-width: 1100px;
      margin: 0 auto 28px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #5a5854;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .dot-complete  { background: var(--forest); }
    .dot-progress  { background: var(--saffron); }
    .dot-upcoming  { background: var(--mist); border: 1.5px solid #c8c4b8; }
    .dot-today     { width: 2px; height: 14px; background: var(--crimson); border-radius: 1px; }

    /* ─── Gantt Container ────────────────────────────────── */
    .gantt-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--white);
      border: 1px solid #dedad2;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.06);
    }

    /* ─── Month Header ───────────────────────────────────── */
    .gantt-header {
      display: grid;
      grid-template-columns: 220px 1fr;
      border-bottom: 1px solid #dedad2;
    }

    .gantt-header .label-col {
      padding: 16px 24px;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9a9690;
      border-right: 1px solid #dedad2;
    }

    .month-cols {
      display: grid;
      position: relative;
    }

    .month-cell {
      padding: 16px 0;
      text-align: center;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7a7670;
      border-right: 1px solid #eee9e0;
    }
    .month-cell:last-child { border-right: none; }

    /* ─── Week sub-header ────────────────────────────────── */
    .gantt-weeks {
      display: grid;
      grid-template-columns: 220px 1fr;
      border-bottom: 1px solid #dedad2;
      background: #faf9f6;
    }

    .gantt-weeks .label-col {
      border-right: 1px solid #dedad2;
    }

    .week-cols {
      display: grid;
      position: relative;
    }

    .week-cell {
      padding: 6px 0;
      text-align: center;
      font-size: 10px;
      color: #b0aca4;
      border-right: 1px solid #eee9e0;
      letter-spacing: 0.06em;
    }
    .week-cell:last-child { border-right: none; }
    .week-cell.today-col { background: #fff5f5; color: var(--crimson); font-weight: 600; }

    /* ─── Task Row ───────────────────────────────────────── */
    .task-row {
      display: grid;
      grid-template-columns: 220px 1fr;
      border-bottom: 1px solid #f0ede6;
      min-height: 60px;
      transition: background 0.15s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: #faf9f6; }

    .task-label {
      padding: 0 24px;
      border-right: 1px solid #dedad2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .task-name {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--stone);
    }

    .task-dates {
      font-size: 11px;
      color: #9a9690;
      letter-spacing: 0.02em;
    }

    .task-bar-area {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 0;
    }

    /* Vertical grid lines */
    .task-bar-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        to right,
        transparent,
        transparent calc(100% / var(--cols) - 1px),
        #eee9e0 calc(100% / var(--cols) - 1px),
        #eee9e0 calc(100% / var(--cols))
      );
      pointer-events: none;
    }

    /* Today line */
    .today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--crimson);
      z-index: 10;
      pointer-events: none;
    }
    .today-line::after {
      content: 'Today';
      position: absolute;
      top: 50%;
      transform: translateY(-50%) translateX(4px);
      font-size: 9px;
      font-weight: 600;
      color: var(--crimson);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ─── Bars ───────────────────────────────────────────── */
    .bar {
      position: absolute;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      overflow: hidden;
      cursor: default;
      transition: filter 0.2s, transform 0.2s;
      z-index: 5;
    }
    .bar:hover {
      filter: brightness(1.08);
      transform: scaleY(1.08);
    }

    .bar-complete {
      background: linear-gradient(90deg, var(--forest) 0%, #3d6b1f 100%);
    }
    .bar-complete .bar-fill {
      background: rgba(255,255,255,0.08);
      height: 100%;
      width: 100%;
    }

    .bar-progress {
      background: linear-gradient(90deg, var(--saffron) 0%, #ffaa33 100%);
    }
    .bar-progress .bar-fill {
      background: rgba(255,255,255,0.15);
      height: 100%;
      /* width set inline = % complete */
    }

    .bar-upcoming {
      background: var(--mist);
      border: 1.5px solid #c8c4b8;
    }

    .bar-label {
      position: absolute;
      left: 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
      pointer-events: none;
    }
    .bar-complete .bar-label,
    .bar-progress .bar-label { color: rgba(255,255,255,0.92); }
    .bar-upcoming .bar-label  { color: #8a8680; }

    /* ─── Status Badge ───────────────────────────────────── */
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
      width: fit-content;
    }
    .badge-complete { background: #e8f0e0; color: var(--forest); }
    .badge-progress { background: #fff3e0; color: #c45f00; }
    .badge-upcoming { background: #f0ede6; color: #8a8680; }

    /* ─── Summary bar ────────────────────────────────────── */
    .summary {
      max-width: 1100px;
      margin: 28px auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }

    .summary-card {
      background: var(--white);
      border: 1px solid #dedad2;
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .summary-number {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--stone);
      line-height: 1;
      margin-bottom: 6px;
    }

    .summary-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9a9690;
      font-weight: 500;
    }

    .summary-card.highlight .summary-number { color: var(--saffron); }
    .summary-card.done .summary-number { color: var(--forest); }

    /* ─── Footer ─────────────────────────────────────────── */
    footer {
      max-width: 1100px;
      margin: 40px auto 0;
      text-align: center;
      font-size: 11px;
      color: #b0aca4;
      letter-spacing: 0.08em;
    }

    /* ─── Tooltip ────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: var(--stone);
      color: #f0ede6;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.15s;
      max-width: 220px;
      line-height: 1.5;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    #tooltip.visible { opacity: 1; }
    #tooltip strong { color: var(--gold-lt); display: block; margin-bottom: 3px; }
  </style>
</head>
<body>

  <header>
    <div class="eyebrow">Project Timeline</div>
    <h1>Bhutan Luxury Travel — Website Build</h1>
    <div class="gold-rule"></div>
    <p>Tracking four key phases from brand foundation to live launch &nbsp;·&nbsp; March – May 2026</p>
  </header>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><span class="legend-dot dot-complete"></span> Complete</div>
    <div class="legend-item"><span class="legend-dot dot-progress"></span> In Progress</div>
    <div class="legend-item"><span class="legend-dot dot-upcoming"></span> Upcoming</div>
    <div class="legend-item"><span class="legend-dot dot-today"></span> Today</div>
  </div>

  <!-- Gantt Chart -->
  <div class="gantt-wrapper" id="gantt"></div>

  <!-- Summary Cards -->
  <div class="summary">
    <div class="summary-card done">
      <div class="summary-number">2</div>
      <div class="summary-label">Phases Complete</div>
    </div>
    <div class="summary-card highlight">
      <div class="summary-number">1</div>
      <div class="summary-label">In Progress</div>
    </div>
    <div class="summary-card">
      <div class="summary-number">1</div>
      <div class="summary-label">Upcoming</div>
    </div>
    <div class="summary-card">
      <div class="summary-number" id="days-to-launch">—</div>
      <div class="summary-label">Days to Launch</div>
    </div>
  </div>

  <footer>
    Generated&nbsp;·&nbsp;Bhutan Luxury Travel Website Project&nbsp;·&nbsp;Dave @ Edge8
  </footer>

  <div id="tooltip"></div>

  <script>
    // ─── Data ───────────────────────────────────────────────
    const PROJECT_START = new Date('2026-03-01');
    const PROJECT_END   = new Date('2026-05-21');
    const TODAY         = new Date('2026-04-02');

    const tasks = [
      {
        name:     'Brand & Style Guide',
        start:    new Date('2026-03-01'),
        end:      new Date('2026-03-14'),
        progress: 100,
        status:   'complete',
        notes:    'Brand identity, colour palette, typography system, logo usage. Delivered as a comprehensive style guide.',
      },
      {
        name:     'Homepage Design',
        start:    new Date('2026-03-10'),
        end:      new Date('2026-03-31'),
        progress: 100,
        status:   'complete',
        notes:    'Hero section, navigation, tours overview, cultural highlights, and footer. HTML/CSS fully built.',
      },
      {
        name:     'Inner Pages',
        start:    new Date('2026-04-01'),
        end:      new Date('2026-04-30'),
        progress: 5,
        status:   'progress',
        notes:    'Tour detail pages, itineraries, destinations gallery, and contact page. Currently in early development.',
      },
      {
        name:     'SEO & Launch',
        start:    new Date('2026-05-01'),
        end:      new Date('2026-05-20'),
        progress: 0,
        status:   'upcoming',
        notes:    'Meta optimisation, performance testing, cross-browser QA, DNS setup and go-live.',
      },
    ];

    // ─── Timeline helpers ───────────────────────────────────
    const totalMs = PROJECT_END - PROJECT_START;

    function pct(date) {
      return Math.max(0, Math.min(100, ((date - PROJECT_START) / totalMs) * 100));
    }

    // Build weekly ticks (Sundays)
    const weeks = [];
    let d = new Date(PROJECT_START);
    // Snap to first Sunday on or after start
    while (d.getDay() !== 0) d.setDate(d.getDate() + 1);
    while (d <= PROJECT_END) {
      weeks.push(new Date(d));
      d.setDate(d.getDate() + 7);
    }

    // Build month spans
    const months = [];
    let cur = new Date(PROJECT_START.getFullYear(), PROJECT_START.getMonth(), 1);
    while (cur <= PROJECT_END) {
      const mStart = new Date(cur);
      const mEnd   = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
      months.push({
        label: cur.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }),
        left:  pct(mStart < PROJECT_START ? PROJECT_START : mStart),
        right: 100 - pct(mEnd > PROJECT_END ? PROJECT_END : mEnd),
      });
      cur.setMonth(cur.getMonth() + 1);
    }

    // ─── Build DOM ──────────────────────────────────────────
    const gantt = document.getElementById('gantt');

    // Month header row
    const monthRow = document.createElement('div');
    monthRow.className = 'gantt-header';
    monthRow.innerHTML = `<div class="label-col">Phase</div>`;
    const monthCols = document.createElement('div');
    monthCols.className = 'month-cols';
    monthCols.style.gridTemplateColumns = months.map(m => `${(100 - parseFloat(m.left) - parseFloat(m.right)).toFixed(2)}fr`).join(' ');
    months.forEach(m => {
      const cell = document.createElement('div');
      cell.className = 'month-cell';
      cell.textContent = m.label;
      monthCols.appendChild(cell);
    });
    monthRow.appendChild(monthCols);
    gantt.appendChild(monthRow);

    // Week sub-header
    const weekRow = document.createElement('div');
    weekRow.className = 'gantt-weeks';
    weekRow.innerHTML = `<div class="label-col"></div>`;
    const weekCols = document.createElement('div');
    weekCols.className = 'week-cols';
    weekCols.style.gridTemplateColumns = `repeat(${weeks.length}, 1fr)`;
    weeks.forEach(w => {
      const cell = document.createElement('div');
      const isToday = w <= TODAY && TODAY < new Date(w.getTime() + 7 * 86400000);
      cell.className = 'week-cell' + (isToday ? ' today-col' : '');
      cell.textContent = w.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      weekCols.appendChild(cell);
    });
    weekRow.appendChild(weekCols);
    gantt.appendChild(weekRow);

    const NCOLS = weeks.length;

    // Task rows
    tasks.forEach(task => {
      const row = document.createElement('div');
      row.className = 'task-row';

      const statusMap = { complete: 'Complete', progress: 'In Progress', upcoming: 'Upcoming' };
      const badgeMap  = { complete: 'badge-complete', progress: 'badge-progress', upcoming: 'badge-upcoming' };

      const formatDate = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

      row.innerHTML = `
        <div class="task-label">
          <span class="task-name">${task.name}</span>
          <span class="task-dates">${formatDate(task.start)} – ${formatDate(task.end)}</span>
          <span class="status-badge ${badgeMap[task.status]}">${statusMap[task.status]}</span>
        </div>
        <div class="task-bar-area" style="--cols:${NCOLS}"></div>
      `;

      const barArea = row.querySelector('.task-bar-area');

      // Today line
      const todayLine = document.createElement('div');
      todayLine.className = 'today-line';
      todayLine.style.left = pct(TODAY) + '%';
      barArea.appendChild(todayLine);

      // Bar
      const bar = document.createElement('div');
      bar.className = `bar bar-${task.status}`;
      const barLeft  = pct(task.start);
      const barRight = 100 - pct(task.end);
      bar.style.left  = barLeft + '%';
      bar.style.right = barRight + '%';

      if (task.status === 'progress') {
        const fill = document.createElement('div');
        fill.className = 'bar-fill';
        fill.style.width = task.progress + '%';
        bar.appendChild(fill);
      } else {
        const fill = document.createElement('div');
        fill.className = 'bar-fill';
        bar.appendChild(fill);
      }

      const lbl = document.createElement('div');
      lbl.className = 'bar-label';
      lbl.textContent = task.progress > 0 ? task.progress + '%' : '';
      bar.appendChild(lbl);

      // Tooltip
      bar.addEventListener('mouseenter', e => showTooltip(e, task));
      bar.addEventListener('mousemove',  e => moveTooltip(e));
      bar.addEventListener('mouseleave',    hideTooltip);

      barArea.appendChild(bar);
      gantt.appendChild(row);
    });

    // ─── Days to launch ─────────────────────────────────────
    const launchDate = new Date('2026-05-20');
    const daysLeft = Math.ceil((launchDate - TODAY) / 86400000);
    document.getElementById('days-to-launch').textContent = daysLeft > 0 ? daysLeft : '0';

    // ─── Tooltip ─────────────────────────────────────────────
    const tooltip = document.getElementById('tooltip');

    function showTooltip(e, task) {
      const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      tooltip.innerHTML = `
        <strong>${task.name}</strong>
        ${fmt(task.start)} – ${fmt(task.end)}<br/>
        Progress: ${task.progress}%<br/>
        <span style="color:#c8c4b8;font-size:11px;margin-top:4px;display:block">${task.notes}</span>
      `;
      tooltip.classList.add('visible');
      moveTooltip(e);
    }

    function moveTooltip(e) {
      const x = e.clientX + 14;
      const y = e.clientY - 10;
      tooltip.style.left = Math.min(x, window.innerWidth - 240) + 'px';
      tooltip.style.top  = y + 'px';
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
    }
  </script>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
